<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Your Profile – Teacher Assistant</title>

  <!-- Your existing public site stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Auth0 + shared helpers -->
  <script defer src="app.js"></script>

  <style>
    /* Page-specific styling that matches your public site */
    .onboarding-container {
      max-width: 480px;
      margin: 80px auto;
      padding: 40px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .onboarding-container h1 {
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
    }

    .onboarding-container p {
      text-align: center;
      margin-bottom: 30px;
      color: #555;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #2a7cff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 10px;
    }

    .submit-btn:hover {
      background: #1f63d6;
    }
  </style>
</head>

<body>
  <div class="onboarding-container">
    <h1>Welcome!</h1>
    <p>Let’s set up your teacher profile.</p>

    <form id="signupForm">
      <div class="form-group">
        <label for="firstName">First Name *</label>
        <input type="text" id="firstName" required />
