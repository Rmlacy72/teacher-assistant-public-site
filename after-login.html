<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing you in…</title>

  <!-- Load Auth0 SDK FIRST -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.5/auth0-spa-js.production.js"></script>

  <!-- Then load your shared Auth0 helper code -->
  <script src="app.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 120px;
      color: #444;
    }
  </style>
</head>

<body>
  <h2>Signing you in…</h2>
  <p>Please wait a moment.</p>

  <script>
    async function handleLogin() {
      // Ensure Auth0 client is initialized
      await initAuth0();

      // Parse Auth0 token from URL
      await auth0Client.handleRedirectCallback();

      // Ensure Auth0 client is initialized
        await initAuth0();

        // Parse Auth0 token from URL
        await auth0Client.handleRedirectCallback();

        // Get a valid ACCESS TOKEN for your API
        const accessToken = await auth0Client.getTokenSilently({
          authorizationParams: {
            audience: "https://teacherassistant-api"
          }
        });

        // Call backend with the ACCESS TOKEN
        const res = await fetch("https://ltc-teacher-grading-api-multi-tenant-fvbdadcfdgc6f9bt.canadacentral-01.azurewebsites.net/api/me", {
          headers: {
            Authorization: `Bearer ${accessToken}`
          }
        });


      const profile = await res.json();

      // Decide where to send the teacher next
      if (!profile.profileComplete) {
        window.location.href = "/signup.html";
      } else {
        window.location.href = "https://polite-river-038be3d0f.1.azurestaticapps.net/index.html";
      }
    }

    handleLogin();
  </script>
</body>
</html>
