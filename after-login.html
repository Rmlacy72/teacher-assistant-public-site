<script>
  async function handleLogin() {
    await initAuth0();
    await auth0Client.handleRedirectCallback();

    const accessToken = await auth0Client.getTokenSilently({
      authorizationParams: {
        audience: "https://teacherassistant-api"
      }
    });

    const res = await fetch(
      "https://ltc-teacher-grading-api-multi-tenant-fvbdadcfdgc6f9bt.canadacentral-01.azurewebsites.net/api/me",
      {
        headers: {
          Authorization: `Bearer ${accessToken}`
        }
      }
    );

    const profile = await res.json();

    if (!profile.profileComplete) {
      window.location.href = "/signup.html";
    } else {
      window.location.href = "https://app.teacherassist.ai"; 
      // or your teacher app static site URL
    }
  }

  handleLogin();
</script>
